

<nav class="bg-white border-gray-200 shadow">
    <div class="flex flex-wrap justify-between items-center mx-auto max-w-screen-xl px-4 py-2 sm:py-0">
        <a href="https://flowbite.com" class="flex items-center space-x-3 rtl:space-x-reverse">
            <img src="logo.png" class="w-40 sm:w-64" alt="Logo"/>
        </a>

        <p-button label="Iniciar sesión" icon="pi pi-sign-in" [routerLink]="['/auth/login']" styleClass="text-sm sm:text-base" />
    </div>
</nav>
<div class="w-full sm:w-3/4 lg:w-1/2 xl:w-1/3 mx-auto space-y-4 sm:space-y-5 mt-4 sm:mt-5 px-4 sm:px-0 pb-8">
    <h3 class="text-lg sm:text-xl font-semibold">Formato de solicitud de registro</h3>
    <form [formGroup]="accountForm" class="w-full space-y-4 sm:space-y-5">
        <div class="flex flex-col gap-1">
            <label class="font-medium text-sm">Nombre del representante</label>
            <input type="text" pInputText formControlName="representante" class="w-full" />
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 sm:gap-5">
            <div class="flex flex-col gap-1">
                <label class="font-medium text-sm">Correo electrónico</label>
                <input type="email" pInputText formControlName="email" class="w-full" />
            </div>

            <div class="flex flex-col gap-1">
                <label class="font-medium text-sm">Confirmar correo electrónico</label>
                <input type="email" pInputText formControlName="confirm_email" class="w-full" />
            </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 sm:gap-5">
            <div class="flex flex-col gap-1">
                <label class="font-medium text-sm">Teléfono</label>
                <input type="text" pInputText formControlName="telefono" class="w-full" />
            </div>
            <div class="flex flex-col gap-1">
                <label class="font-medium text-sm">Licencia de funcionamiento</label>
                <input type="text" pInputText formControlName="licencia_funcionamiento" class="w-full" />
            </div>
        </div>

        <div class="flex flex-col gap-1">
            <label class="font-medium text-sm">Nombre comercial del alojamiento</label>
            <input type="text" pInputText formControlName="nombre_establecimiento" class="w-full" />
        </div>

        <div class="flex flex-col gap-1">
            <label class="font-medium text-sm">Archivo PDF que demuestre que tiene control para administrar esta empresa</label>
            <p-fileupload #fu
                          [customUpload]="true"
                          (uploadHandler)="register($event)"
                          [disabled]="isLoading"
                          mode="basic"
                          chooseLabel="Seleccionar archivo"
                          chooseIcon="pi pi-upload"
                          accept="application/pdf"
                          maxFileSize="10000000"
            />


        </div>

        <div>
            <p-button
                (onClick)="fu.upload()"
                [disabled]="isLoading"
                [loading]="isLoading"
                label="Registrarme"
                icon="pi pi-check-circle"
                severity="success"
                styleClass="w-full sm:w-auto"
            />
        </div>
    </form>
</div>
<p-confirm-dialog/>
