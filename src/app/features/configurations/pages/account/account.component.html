<div class="w-full sm:w-2/3 lg:w-1/2 xl:w-1/3 mx-auto space-y-4 sm:space-y-5 mt-4 sm:mt-5 px-4 sm:px-0">
    <div class="flex items-center space-x-2">
        <i class="pi pi-check-square"></i>
        <h3 class="text-lg sm:text-xl font-semibold">Mi cuenta</h3>
    </div>

    @if (accountForm) {
        <form [formGroup]="accountForm" class="w-full space-y-4 sm:space-y-5">
            <div class="flex flex-col gap-1">
                <label class="font-medium text-sm">Nombre del representante</label>
                <input type="text" pInputText formControlName="nombre" class="w-full" />
            </div>
            <div class="flex flex-col gap-1">
                <label class="font-medium text-sm">Correo electrónico</label>
                <input type="email" pInputText formControlName="email" class="w-full" />
            </div>

            <div class="flex flex-col gap-1">
                <label class="font-medium text-sm">Nueva contraseña</label>
                <p-password [toggleMask]="true" formControlName="password" styleClass="w-full" inputStyleClass="w-full" />
            </div>

            <div class="flex flex-col gap-1">
                <label class="font-medium text-sm">Teléfono</label>
                <input type="text" pInputText formControlName="telefono" class="w-full" />
            </div>


            <div>
                <p-button
                    [disabled]="isUpdating"
                    [loading]="isUpdating"
                    label="Actualizar"
                    icon="pi pi-check-circle"
                    (click)="updateUser()"
                    styleClass="w-full sm:w-auto"
                />
            </div>
        </form>
    }
</div>
